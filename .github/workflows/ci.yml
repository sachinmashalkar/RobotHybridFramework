name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (robocop + robotidy --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Robocop lint
        run: robocop --threshold W resources tests libraries

      - name: Robotidy formatting check
        run: robotidy --check --no-overwrite resources tests

  unit-tests:
    name: Python unit tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/unit -v

  dry-run:
    name: Robot dry-run
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dry run (offline keyword resolution)
        run: bash scripts/dry_run.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dryrun-results
          path: results/dryrun

  tests:
    name: UI + API tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [dry-run, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        browser: [headlesschrome, headlessfirefox]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Google Chrome
        if: matrix.browser == 'headlesschrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Firefox
        if: matrix.browser == 'headlessfirefox'
        uses: browser-actions/setup-firefox@v1

      - name: Run API suite
        run: bash scripts/run_tests.sh --suite tests/api --browser ${{ matrix.browser }}

      - name: Run UI suite
        run: bash scripts/run_tests.sh --suite tests/ui --browser ${{ matrix.browser }}

      - name: Generate metrics
        if: always()
        run: |
          LAST=$(ls -1dt results/2* | head -n1)
          python -m robotframework_metrics --inputpath "$LAST" --output metrics.html || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.browser }}
          path: |
            results/
            metrics.html
          retention-days: 14
