default: chrome
grid_url: http://localhost:4444/wd/hub
browsers:
  chrome:
    name: chrome
    options:
      - "--disable-gpu"
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      - "--window-size=1920,1080"
    prefs:
      download.default_directory: "/tmp/downloads"
      download.prompt_for_download: false
  headlesschrome:
    name: chrome
    options:
      - "--headless=new"
      - "--disable-gpu"
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      - "--window-size=1920,1080"
  firefox:
    name: firefox
    options:
      - "--width=1920"
      - "--height=1080"
  headlessfirefox:
    name: firefox
    options:
      - "-headless"
      - "--width=1920"
      - "--height=1080"
  edge:
    name: edge
    options:
      - "--window-size=1920,1080"

# Reference profile consumed by the `CdpConnect.Connect To CDP App` keyword
# when attaching Selenium to a Chromium-based desktop app exposing CDP.
# BrowserFactory does not launch this profile; call the keyword directly
# and pass overrides as needed.
cdp_app:
  debugger_address: 127.0.0.1:9222
  startup_timeout: 60
  page_load_strategy: none
  # target_url_contains: app://main
  # chromedriver_path: C:\\Tools\\chromedriver-120\\chromedriver.exe
